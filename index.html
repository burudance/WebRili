<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>237日历</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='54' height='50' x='5' y='9' rx='8' fill='%232f78ff'/%3E%3Crect width='54' height='38' x='5' y='21' rx='5' fill='white'/%3E%3Crect width='8' height='10' x='17' y='4' rx='3' fill='%231f2d3d'/%3E%3Crect width='8' height='10' x='39' y='4' rx='3' fill='%231f2d3d'/%3E%3Ctext x='32' y='48' text-anchor='middle' font-size='22' font-family='Arial' font-weight='700' fill='%232f78ff'%3E237%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #e7edf5;
      --text: #1f2d3d;
      --muted: #6b7a90;
      --blue: #2f78ff;
      --blue-soft: #eaf2ff;
      --red: #e64b3c;
      --orange: #f28b20;
      --green: #22a06b;
      --green-soft: #e9f8f1;
      --orange-soft: #fff3e2;
      --shadow: 0 18px 45px rgba(28, 55, 90, 0.08);
      --cell: #ffffff;
      --cell-soft: #fbfcfe;
      --toolbar: #fbfdff;
    }

    body.dark {
      --bg: #111827;
      --panel: #182235;
      --line: #2a3850;
      --text: #eef4ff;
      --muted: #a9b8cf;
      --blue: #72a7ff;
      --blue-soft: #203756;
      --red: #ff8175;
      --orange: #ffb25c;
      --green: #54d394;
      --green-soft: #163b2d;
      --orange-soft: #49331c;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --cell: #1d2940;
      --cell-soft: #172237;
      --toolbar: #152033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        linear-gradient(180deg, #eaf3ff 0, rgba(234, 243, 255, 0) 250px),
        var(--bg);
    }

    body.dark {
      background:
        linear-gradient(180deg, #172c4b 0, rgba(23, 44, 75, 0) 280px),
        var(--bg);
    }

    button {
      font: inherit;
    }

    select {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 28px 0 10px;
      color: var(--text);
      background: var(--cell);
      font: inherit;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 28px auto;
    }

    .calendar-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 315px;
      gap: 18px;
      align-items: stretch;
    }

    .main-panel,
    .side-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .month-switch {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .icon-btn,
    .today-btn,
    .week-toggle,
    .ghost-btn {
      height: 36px;
      border: 1px solid var(--line);
      background: var(--cell);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .icon-btn {
      width: 36px;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
    }

    .today-btn,
    .week-toggle,
    .ghost-btn {
      padding: 0 14px;
      white-space: nowrap;
    }

    .icon-btn:hover,
    .today-btn:hover,
    .week-toggle:hover,
    .ghost-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-soft);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .month-picker {
      min-width: 104px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .year-picker {
      min-width: 116px;
    }

    .week-head,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .week-head {
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: var(--cell);
    }

    .week-head div {
      height: 42px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .week-head div:nth-child(n+6) {
      color: var(--red);
    }

    .calendar-grid {
      padding: 12px;
      min-height: 646px;
    }

    body.dark .calendar-grid {
      background: var(--cell);
    }

    .day-cell {
      position: relative;
      min-height: 104px;
      padding: 9px 9px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: var(--cell);
      transition: 0.15s ease;
      overflow: hidden;
    }

    body.dark .day-cell {
      border-color: var(--line);
      border-radius: 6px;
    }

    body.dark .day-cell.other {
      border-color: var(--line);
    }

    .day-cell:hover {
      border-color: #b8d2ff;
      background: #f8fbff;
      box-shadow: inset 0 0 0 1px #b8d2ff;
    }

    body.dark .day-cell:not(.other):hover {
      border-color: #5f83bd;
      background: #2f3a4f;
      box-shadow: inset 0 0 0 1px #5f83bd;
    }

    body.dark .day-cell:not(.other).selected {
      background: #263852;
    }

    .day-cell.other {
      color: #b9c3d0;
      background: var(--cell-soft);
      border-color: var(--line);
    }

    .day-cell.other .solar {
      color: #98a4b5;
    }

    .day-cell.selected {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
      background: var(--blue-soft);
    }

    .day-cell.today {
      background: linear-gradient(180deg, var(--blue-soft) 0, var(--cell) 80%);
    }

    .day-cell.official-holiday {
      background: #fff0e6;
      border-color: #f6cdbb;
    }

    .day-cell.official-holiday.selected {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .day-cell.official-holiday.holiday-chain-prev {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .day-cell.official-holiday.holiday-chain-next {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    body.dark .day-cell.official-holiday {
      background: #3d2a2a;
      border-color: #76504b;
    }

    body.dark .day-cell.official-holiday.selected {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    body.dark .day-cell.official-holiday:not(.other):hover {
      border-color: #9a5a52;
      background: #4a3131;
      box-shadow: inset 0 0 0 1px #9a5a52;
    }

    .day-cell.today .solar {
      color: #fff;
      background: var(--blue);
      border-radius: 50%;
    }

    .date-line {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
    }

    .solar {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .day-cell.weekend .solar,
    .day-cell.holiday .solar {
      color: var(--red);
    }

    .day-cell.today .solar {
      color: #fff;
    }

    .today-mark {
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
      position: absolute;
      right: 2px;
      top: 2px;
    }

    .corner-status {
      position: absolute;
      right: 2px;
      top: 3px;
    }

    .lunar {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .tags {
      display: grid;
      place-items: center;
      margin-top: 8px;
      min-height: 22px;
    }

    .tag-slot {
      max-width: 100%;
      display: grid;
      place-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 20px;
      max-width: 100%;
      padding: 0 6px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 20px;
      white-space: nowrap;
    }

    .tag.festival {
      color: var(--red);
      background: #fff0ee;
    }

    .tag.term {
      color: #1f76a8;
      background: #eaf7ff;
    }

    .tag.special {
      color: #8a5a12;
      background: #fff7df;
    }

    body.dark .tag.festival {
      color: #ffaaa2;
      background: #4a2427;
    }

    body.dark .tag.term {
      color: #9edcff;
      background: #18384a;
    }

    body.dark .tag.special {
      color: #ffe08a;
      background: #483914;
    }

    .tag.off {
      color: var(--green);
      background: var(--green-soft);
      font-weight: 700;
    }

    .tag.work {
      color: var(--orange);
      background: var(--orange-soft);
      font-weight: 700;
    }

    .side-panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-box {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .info-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .almanac {
      display: grid;
      gap: 10px;
    }

    .almanac-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .almanac-row span {
      text-align: left;
    }

    .almanac-row b {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
    }

    .almanac-row.good b {
      background: var(--green);
    }

    .almanac-row.bad b {
      background: var(--red);
    }

    .countdown {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--cell);
    }

    .countdown strong {
      color: var(--red);
      font-size: 22px;
    }

    .countdown-list {
      display: grid;
      gap: 8px;
    }

    .countdown-item {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: baseline;
      column-gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .countdown-item strong {
      color: var(--red);
      font-size: 16px;
      white-space: nowrap;
      justify-self: end;
    }

    .week-type-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-soft);
      font-weight: 700;
    }

    .week-toggle:disabled,
    .week-type-btn:disabled,
    .ghost-btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .week-settings {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--cell);
    }

    .week-setting-actions {
      display: flex;
      gap: 5px;
      flex-wrap: nowrap;
    }

    .week-setting-actions button,
    .week-setting-actions .switch-control {
      flex: 1 1 0;
      min-width: 0;
      height: 32px;
      padding: 0 6px;
      font-size: 13px;
    }

    .week-setting-actions .switch-control {
      justify-content: center;
      gap: 5px;
    }

    .week-setting-actions .switch-control input {
      width: 28px;
      height: 17px;
      flex: 0 0 auto;
    }

    .week-setting-actions .switch-control input::after {
      width: 13px;
      height: 13px;
    }

    .week-setting-actions .switch-control input:checked::after {
      transform: translateX(11px);
    }

    .compact-info {
      margin-bottom: 12px;
    }

    .switch-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: var(--cell);
      cursor: pointer;
      white-space: nowrap;
    }

    .switch-control input {
      appearance: none;
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: #b9c3d0;
      position: relative;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .switch-control input::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      left: 2px;
      top: 2px;
      background: #fff;
      transition: 0.18s ease;
    }

    .switch-control input:checked {
      background: var(--blue);
    }

    .switch-control input:checked::after {
      transform: translateX(14px);
    }

    .cell-burst-layer {
      position: absolute;
      inset: -20px;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .cell-confetti {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 7px;
      height: 10px;
      border-radius: 2px;
      animation: cell-confetti 1.7s ease-out forwards;
    }

    .cell-ripple {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(47, 120, 255, 0.45);
      box-shadow: 0 0 18px rgba(47, 120, 255, 0.32);
      transform: translate(-50%, -50%);
      animation: cell-ripple 1.5s ease-out forwards;
    }

    @keyframes cell-confetti {
      to {
        transform: translate(var(--tx), var(--ty)) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes cell-ripple {
      to {
        transform: translate(-50%, -50%) scale(5.4);
        opacity: 0;
      }
    }

    .mini-list {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (max-width: 930px) {
      .calendar-shell {
        grid-template-columns: 1fr;
      }

      .side-panel {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .side-panel .info-box:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: calc(100vw - 16px);
        margin: 8px auto;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .month-switch {
        justify-content: space-between;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button {
        flex: 1;
      }

      .calendar-grid {
        padding: 6px;
        min-height: 520px;
      }

      .week-head {
        padding: 0 6px;
      }

      .day-cell {
        min-height: 86px;
        padding: 6px 5px;
        border-radius: 6px;
      }

      .solar {
        width: 24px;
        height: 24px;
        font-size: 17px;
      }

      .lunar,
      .tag {
        font-size: 11px;
      }

      .tag {
        height: 18px;
        line-height: 18px;
        padding: 0 4px;
      }

      .side-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="calendar-shell">
      <div class="main-panel">
        <header class="toolbar">
          <div class="month-switch">
            <button class="icon-btn" id="prevMonth" aria-label="上个月">‹</button>
            <select class="month-picker year-picker" id="yearSelect" aria-label="选择年份"></select>
            <select class="month-picker" id="monthSelect" aria-label="选择月份"></select>
            <button class="icon-btn" id="nextMonth" aria-label="下个月">›</button>
          </div>
          <div class="actions">
            <button class="today-btn" id="todayBtn">今天</button>
            <button class="icon-btn" id="themeBtn" aria-label="切换深浅色">☾</button>
          </div>
        </header>

        <div class="week-head">
          <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <aside class="side-panel">
        <div class="info-box">
          <h2 class="info-title">黄历信息</h2>
          <div class="mini-list compact-info">
            <div id="lunarFullInfo">丙午年 四月十三</div>
            <div id="yearWeekInfo">本年度第 1 周</div>
          </div>
          <div class="almanac">
            <div class="almanac-row good"><b>宜</b><span id="goodThings"></span></div>
            <div class="almanac-row bad"><b>忌</b><span id="badThings"></span></div>
          </div>
        </div>

        <div class="info-box">
          <h2 class="info-title">大小周设置</h2>
          <div class="week-settings">
            <div class="mini-list">
              <div id="weekTip">本周：大周（周六周日休）</div>
              <div id="overrideTip">默认从 2026 年第 1 周开始大/小周交替</div>
            </div>
            <div class="week-setting-actions">
              <label class="switch-control">
                <input type="checkbox" id="weekFeatureSwitch" checked />
                <span>启用</span>
              </label>
              <button class="week-toggle week-type-btn" id="setBigWeekBtn">本周大</button>
              <button class="week-toggle week-type-btn" id="setSmallWeekBtn">本周小</button>
            </div>
          </div>
        </div>

        <div class="info-box">
          <h2 class="info-title">节日倒计时</h2>
          <div class="countdown-list" id="countdown"></div>
        </div>
      </aside>
    </section>
  </main>

    function render() {

    function renderGrid() {
      grid.innerHTML = "";
      const start = startOfWeek(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1));
      for (let i = 0; i < 42; i++) {
        const date = addDays(start, i);
        const key = dateKey(date);
        const lunar = solarToLunar(date);
        const official = officialDays[key];
        const status = getDayStatus(date);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        const isOfficialHoliday = official?.status === "off";
        const tags = getTags(date, lunar);
        const activeTag = tags.length ? tags[tagRotationTick % tags.length] : null;
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = [
          "day-cell",
          date.getMonth() !== viewDate.getMonth() ? "other" : "",
          isWeekend ? "weekend" : "",
          isOfficialHoliday ? "holiday official-holiday" : "",
          isOfficialHoliday && isAdjacentOfficialHoliday(date, -1) ? "holiday-chain-prev" : "",
          isOfficialHoliday && isAdjacentOfficialHoliday(date, 1) ? "holiday-chain-next" : "",
          sameDay(date, today) ? "today" : "",
          sameDay(date, selectedDate) ? "selected" : ""
        ].filter(Boolean).join(" ");
        cell.addEventListener("click", () => {
          selectedDate = startOfDay(date);
          if (viewDate.getMonth() !== date.getMonth() || viewDate.getFullYear() !== date.getFullYear()) {

          render();

    function getTags(date, lunar) {
      const key = dateKey(date);
      const mmdd = key.slice(5);
      const list = [];
      const official = officialDays[key];
      if (official && official.name !== "调休") list.push({ name: official.name, kind: "festival" });
      if (solarFestivals[mmdd] && !list.some(item => sameFestivalName(item.name, solarFestivals[mmdd]))) {
        list.push({ name: solarFestivals[mmdd], kind: "special" });
      }
      const dynamicFestival = getDynamicSolarFestival(date);
      if (dynamicFestival && !list.some(item => sameFestivalName(item.name, dynamicFestival))) {
        list.push({ name: dynamicFestival, kind: "special" });
      }
      if (solarTerms[key]) list.push({ name: solarTerms[key], kind: "term" });
      const lunarKey = `${lunar.month}-${lunar.day}`;
      if (!lunar.isLeap && lunarFestivals[lunarKey] && !list.some(item => sameFestivalName(item.name, lunarFestivals[lunarKey]))) {
        list.push({ name: lunarFestivals[lunarKey], kind: "festival" });
      }
      if (lunar.month === 12 && lunar.day === monthDays(lunar.year, 12)) {
        list.push({ name: "除夕", kind: "festival" });
      }
      return list.slice(0, 3);
    }

    function sameFestivalName(a, b) {
      return a === b || `${a}节` === b || a === `${b}节`;
    }

    function getDynamicSolarFestival(date) {
      const year = date.getFullYear();
      if (sameDay(date, nthWeekdayOfMonth(year, 4, 0, 2))) return "母亲节";
      if (sameDay(date, nthWeekdayOfMonth(year, 5, 0, 3))) return "父亲节";
      if (sameDay(date, nthWeekdayOfMonth(year, 10, 4, 4))) return "感恩节";
      return "";
    }

    function getDayStatus(date) {
      const key = dateKey(date);
      if (officialDays[key]) return officialDays[key];
      if (!weekFeatureEnabled) return null;
      if (isBeforeCurrentSystemMonth(date)) return null;
      if (isHolidayWeekendWeek(startOfWeek(date))) return null;
      if (date.getDay() === 0) return { status: "off", name: "周末" };
      if (date.getDay() === 6) {
        return getWeekType(date) === "big" ? { status: "off", name: "大周" } : { status: "work", name: "小周" };
      }
      return null;
    }

    function isAdjacentOfficialHoliday(date, offset) {
      const adjacent = addDays(date, offset);
      if (startOfWeek(adjacent).getTime() !== startOfWeek(date).getTime()) return false;
      return officialDays[dateKey(adjacent)]?.status === "off";
    }

    function getWeekType(date) {
      const weekStart = startOfWeek(date);
      const anchor = weekOverride ? parseDate(weekOverride.start) : defaultAnchor;
      const anchorType = weekOverride ? weekOverride.type : "big";
      const ordinarySteps = countOrdinaryWeekendWeeksBetween(anchor, weekStart);
      return Math.abs(ordinarySteps) % 2 === 0 ? anchorType : oppositeWeek(anchorType);
    }

    function countOrdinaryWeekendWeeksBetween(anchorWeekStart, targetWeekStart) {
      if (sameDay(anchorWeekStart, targetWeekStart)) return 0;
      const direction = targetWeekStart > anchorWeekStart ? 1 : -1;
      let cursor = addDays(anchorWeekStart, direction * 7);
      let count = 0;
      while (direction > 0 ? cursor <= targetWeekStart : cursor >= targetWeekStart) {
        if (!isHolidayWeekendWeek(cursor)) count += direction;
        cursor = addDays(cursor, direction * 7);
      }
      return count;
    }

    function isHolidayWeekendWeek(weekStart) {
      const saturday = addDays(weekStart, 5);
      const sunday = addDays(weekStart, 6);
      return Boolean(officialDays[dateKey(saturday)] || officialDays[dateKey(sunday)]);
    }

    function setCurrentWeekType(type) {
      if (!weekFeatureEnabled) return;
      if (type === "big") {
        weekOverride = null;
        localStorage.removeItem(storageKey);
      } else {
        weekOverride = { start: dateKey(defaultAnchor), type };
        localStorage.setItem(storageKey, JSON.stringify(weekOverride));

      render();

      const status = getDayStatus(date);

    function triggerCelebration(cell) {
      if (!cell) return;
      tagRotationPausedUntil = Date.now() + 2000;
      cell.querySelector(".cell-burst-layer")?.remove();
      const layer = document.createElement("span");
      layer.className = "cell-burst-layer";
      const ripple = document.createElement("span");
      ripple.className = "cell-ripple";
      layer.appendChild(ripple);
      const colors = ["#2f78ff", "#e64b3c", "#f28b20", "#22a06b", "#8b5cf6"];
      for (let i = 0; i < 28; i++) {
        const piece = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 28;
        const distance = 42 + Math.random() * 44;
        piece.className = "cell-confetti";
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
        piece.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
        piece.style.animationDelay = `${Math.random() * 0.18}s`;
        layer.appendChild(piece);
      }
      cell.appendChild(layer);
      setTimeout(() => layer.remove(), 1900);
    }

    function readWeekOverride() {
      try {
        const data = JSON.parse(localStorage.getItem(storageKey));
        if (data && data.start && (data.type === "big" || data.type === "small")) return data;
      } catch (error) {}
      return null;
    }

    function oppositeWeek(type) {
      return type === "big" ? "small" : "big";
    }

    function shiftMonth(offset) {
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + offset, 1);
      selectedDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), Math.min(selectedDate.getDate(), daysInMonth(viewDate)));

    function goToday() {
      selectedDate = startOfDay(today);
      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);

    function getNextImportantFestivals(date, count) {
      const base = startOfDay(date);
      return importantFestivals
        .map(item => {
          const target = parseDate(item.date);
          return { ...item, days: Math.round((target - base) / MS_DAY), target };
        })
        .filter(item => item.days >= 0)
        .sort((a, b) => a.days - b.days)
        .slice(0, count);
    }

    function getGanzhiYear(year) {
      return `${gan[(year - 4) % 10]}${zhi[(year - 4) % 12]}`;
    }

    function getYearWeek(date) {
      const firstDay = new Date(date.getFullYear(), 0, 1);
      const firstWeekStart = startOfWeek(firstDay);
      return Math.floor((startOfWeek(date) - firstWeekStart) / (MS_DAY * 7)) + 1;
    }

    function solarToLunar(date) {
      let offset = Math.floor((startOfDay(date) - new Date(1900, 0, 31)) / MS_DAY);
      let year = 1900;
      let temp = 0;
      while (year < 2050 && offset > 0) {
        temp = lYearDays(year);
        offset -= temp;
        year++;
      }
      if (offset < 0) {
        offset += temp;
        year--;
      }

      const leap = leapMonth(year);
      let isLeap = false;
      let month = 1;
      while (month < 13 && offset > 0) {
        if (leap > 0 && month === leap + 1 && !isLeap) {
          month--;
          isLeap = true;
          temp = leapDays(year);
        } else {
          temp = monthDays(year, month);
        }
        if (isLeap && month === leap + 1) isLeap = false;
        offset -= temp;
        if (!isLeap) month++;
      }
      if (offset === 0 && leap > 0 && month === leap + 1) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          month--;
        }
      }
      if (offset < 0) {
        offset += temp;
        month--;
      }
      return { year, month, day: offset + 1, isLeap };
    }

    function lYearDays(year) {
      let sum = 348;
      for (let bit = 0x8000; bit > 0x8; bit >>= 1) {
        sum += (lunarInfo[year - 1900] & bit) ? 1 : 0;
      }
      return sum + leapDays(year);
    }

    function leapDays(year) {
      if (leapMonth(year)) return (lunarInfo[year - 1900] & 0x10000) ? 30 : 29;
      return 0;
    }

    function leapMonth(year) {
      return lunarInfo[year - 1900] & 0xf;
    }

    function monthDays(year, month) {
      return (lunarInfo[year - 1900] & (0x10000 >> month)) ? 30 : 29;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function startOfWeek(date) {
      const d = startOfDay(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      return d;
    }

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function isBeforeCurrentSystemMonth(date) {
      return startOfMonth(date) < startOfMonth(today);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function nthWeekdayOfMonth(year, monthIndex, weekday, nth) {
      const first = new Date(year, monthIndex, 1);
      const offset = (weekday - first.getDay() + 7) % 7;
      return new Date(year, monthIndex, 1 + offset + (nth - 1) * 7);
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseDate(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function daysInMonth(date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    }
  </script>
